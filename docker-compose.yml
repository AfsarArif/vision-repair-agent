version: "3.9"
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: repair_agent
      POSTGRES_PASSWORD: repair_agent
      POSTGRES_DB: repair_agent_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repair_agent -d repair_agent_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
